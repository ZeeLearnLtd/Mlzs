  <script>
    $(document).ready(function () {
      "use strict";
      var offSetTop =0;
      var $scrollToTopButton = $('.scrollToTop');
      $(window).scroll(function () {
        if ($(this).scrollTop() > offSetTop) {

          document.getElementById('whiteHeader').style.background = "#fff"
        } else {
          document.getElementById('whiteHeader').style.background = "transparent"
        }
      });
      $scrollToTopButton.click(function () {
        $('html, body').animate({ scrollTop: 0 }, 100);
        return false;
      });

    });
  </script>
