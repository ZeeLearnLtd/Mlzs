  <script>
    $(document).ready(function () {
      "use strict";
      var offSetTop = 30;
      var $scrollToTopButton = $('.scrollToTop');

          if ($(window).width() <= 600) {
         $(window).scroll(function () {
        if ($(this).scrollTop() > offSetTop) {
          const el = document.getElementById('fix_header');
          el.style.setProperty('display', 'none', 'important');
         } else {
            const el = document.getElementById('fix_header');
          el.style.setProperty('display', 'grid', 'important');
        }  
     })
      } else {
         $(window).scroll(function () {
        if ($(this).scrollTop() > offSetTop) {
          document.getElementById('whiteHeader').style.top = "0px"
          const el = document.getElementById('fix_header');
          el.style.setProperty('display', 'none', 'important');
          const el2 = document.getElementById('home_banner');
          if (el2) {
          el2.style.setProperty('padding-top', '3rem', 'important');
          }
        } else {
      
          document.getElementById('whiteHeader').style.display = "block"
          const el = document.getElementById('fix_header');
          el.style.setProperty('display', 'block', 'important');
          el.style.setProperty('display', 'flex', 'important');
          const el1 = document.getElementById('whiteHeader');
          el1.style.setProperty('top', '2.5rem', 'important');
          const el2 = document.getElementById('home_banner');
          if (el2) {
          el2.style.setProperty('padding-top', '0rem', 'important');
          }
        }  
     });
      $scrollToTopButton.click(function () {
        $('html, body').animate({ scrollTop: 0 }, 100);
        return false;
      });
      }

    
    });
  </script>
