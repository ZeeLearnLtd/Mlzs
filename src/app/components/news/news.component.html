<section>
    <div class="about_content news">
    <div class="box">
        <div class="row">
            <div class="col-md-12">
                <div class="title_content text-center">
                    <h2 class="text-white"><b>Discover More</b></h2>
                    <img src="../../../assets/img/MLZS/text-bg.png" class="text_bg" alt="">
                    <div class="text-white">
                        <p>Want to know about the exciting events at Mount Litera Zee School?</p>
                        <p>From academic milestones to vibrant extracurriculars, discover all about the latest updates and celebrations within our school community.</p>
                       </div>
                </div>
                <div class="home-demo mt-3">
                    <div class="owl-carousel owl-theme news_owl" id="">
                      <div class="item" *ngFor="let a of eventsData">
                        <div routerLink="/events/{{a.slug}}">
                        <div class="item_img_content" *ngFor="let img of a.logofiles">
                          <img src="{{img.value}}" alt="">
                        </div>
                        <hr>
                        <div class="item_text mt-2">
                          <h6>{{a.Title}}</h6>
                          <p class="short_para" [innerHTML]="a.short"></p>
                          <p class="p-0 m-0">{{a.CreatedDate}}</p>
                        </div>
                        </div>
                      </div>
                    </div>
                  </div>
            </div>
        </div>
       
    </div>
</div>
</section>
