<section>
    <div class="blogs py-4">
        <div class="box">
            <div class="row g-4 align-items-center">
                <div class="col-lg-5">
                    <h2><b>Blogs</b></h2>
                    <img src="../../../assets/img/MLZS/prg_text_bg.png" class="text_bg" alt="">
                    <p>
                        Read up engaging stories and articles, helpful tips, and updates, offering a unique glimpse into
                        the exciting events and experiences that define life at Mount Litera Zee School.
                    </p>
                </div>
                <div class="col-lg-7">
                    <div class="row g-4">
                        <div class="col-12">
                            <div class="blog-card" *ngFor="let img of top_blog?.files">
                                <div>
                                    <img src="{{img.url}}" alt="Image with overlay" />
                                </div>
                                <div class="blog-overlay">
                                    <div class="blog-date">{{top_blog?.FromDate}}</div>
                                    <div class="blog-title">{{top_blog?.Title}}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 col-sm-6 col-12" *ngFor="let a of blogdata">
                    <div class="sub_blog_card" routerLink="/blog/{{a?.slug}}">
                        <div *ngFor="let img of a?.files">
                            <img src="{{img?.url}}" alt="Image with overlay" />
                        </div>
                        <div class="blog-overlay">
                            <div class="blog-date">{{a?.FromDate}}</div>
                            <div class="blog-title">{{a?.Title}}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
