<section>
  <div class="programmes_main_page">
    <div class="banner_content">
      <img src="../https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/events_top_banner.png" class="img-fluid d-none d-md-block w-100"
        alt="about banner">
      <img src="../https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/mobile_banner/Events.jpg" class="img-fluid d-block d-md-none w-100"
        alt="Mobile banner">
    </div>
    <div class="subMenu_content">
      <app-sub-menu></app-sub-menu>
    </div>

    <div class="box mt-3">
      <div class="text-center mt-5">
        <h2 class="text-center"><b>{{eventsDetailsData?.Title}}</b></h2>
        <img src="../https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
      </div>

      <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <!-- <div class="carousel-item" *ngFor="let item of eventsDetailsData?.files; let i = index"
            [class.active]="i === 0">
            <img [src]="item.url" class="d-block w-100" [alt]="item.filename" />
          </div> -->
           <ng-container *ngIf="eventsDetailsData?.files?.length; else defaultEventImg">
    <div 
      class="carousel-item" 
      *ngFor="let item of eventsDetailsData.files; let i = index" 
      [class.active]="i === 0">

      <img 
        [src]="item?.url || 'assets/img/MLZS/MLZS.svg'" 
        class="d-block w-100" 
        [alt]="item?.filename || 'MLZS'"
      />

    </div>
  </ng-container>

  <!-- Fallback if no files -->
  <ng-template #defaultEventImg>
    <div class="carousel-item active">
      <img 
        src="assets/img/MLZS/MLZS.svg" 
        class="d-block w-100 defaultImg" 
        alt="MLZS"
      />
    </div>
  </ng-template>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls"
          data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls"
          data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <p class="text-center mt-4" [innerHTML]="getsanitizehtml(eventsDetailsData?.long1)"></p>
    </div>
  </div>
</section>
