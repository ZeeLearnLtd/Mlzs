<section>
    <div class="programmes_main_page">
        <div class="banner_content">
            <img src="../../../../assets/img/MLZS/banner/events_top_banner.png" class="w-100" alt="">
        </div>
        <div class="subMenu_content">
            <app-sub-menu></app-sub-menu>
        </div>

        <div class="box mt-3">
            <div class="dropdown_tab">
                <div class="row">
                    <div class="col-md-4">
                        <select #ddlcategory name="" id="" class="form-control" [(ngModel)]="selectedcategory"
                            (change)="onchangecategory(ddlcategory.value)">
                            <option value="">All Category</option>
                            <option value="{{data?.categoryId}}" *ngFor="let data of AssignCategory">
                                {{data.categoryname}}</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select #ddlyear name="" id="" [(ngModel)]="Selectedyear" class="form-control"
                            (change)="onyearchange(ddlyear.value)">
                            <option value="">All Year</option>
                            <option value="{{year}}" *ngFor="let year of distinctYears">{{year}}</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <h1 class="text-center"><b>Moments That Matter</b></h1>
                <img src="../../../../assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
            </div>
            <p class="text-center">From cultural celebrations to educational workshops, Mount Litera Zee School hosts a
                variety of events designed to enrich student experiences. Stay connected and discover how our events
                shape an inspiring and dynamic school community.</p>
         
<div *ngFor="let cat of categoryNewsMap; let i = index" class="mb-6">
  <h2 class="text-xl font-bold mb-4">{{ cat.categoryname }}</h2>

  <div *ngIf="cat.news.length > 0">
    <div
      id="carousel-{{ i }}"
      class="carousel slide"
      data-bs-ride="carousel"
    >
      <!-- Carousel Indicators -->
      <div class="carousel-indicators">
        <button
          *ngFor="let a of cat.news; let j = index"
          type="button"
          [attr.data-bs-target]="'#carousel-' + i"
          [attr.data-bs-slide-to]="j"
          [class.active]="j === 0"
          [attr.aria-current]="j === 0 ? 'true' : null"
          [attr.aria-label]="'Slide ' + (j + 1)"
        ></button>
      </div>

      <!-- Carousel Items -->
      <div class="carousel-inner">
        <div
          *ngFor="let a of cat.news; let j = index"
          class="carousel-item"
          [class.active]="j === 0"
        >
          <div class="row mb-3">
            <!-- Image Section -->
            <div class="col-md-5" [routerLink]="'/events/' + a?.slug">
              <div class="img_content">
                <div *ngFor="let img of a.logofiles">
                  <img [src]="img.value" class="d-block w-100" alt="" />
                </div>
              </div>
            </div>

            <!-- Content Section -->
            <div class="col-md-7" [routerLink]="'/events/' + a?.slug">
              <h4 class="fw-bold">{{ a?.Title }}</h4>
              <div class="long_para clamp-3" [innerHTML]="a.Long1"></div>
              <button
                class="btn btn-custom mt-2"
                [routerLink]="'/events/' + a.slug">
                Know More <i class="fa fa-long-arrow-right mx-2"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Carousel Controls -->
      <button
        class="carousel-control-prev"
        type="button"
        [attr.data-bs-target]="'#carousel-' + i"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        [attr.data-bs-target]="'#carousel-' + i"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>
</div>
        </div>
    </div>
</section>
