<section>
    <div class="programmes_main_page">
        <div class="banner_content">
             <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/events_top_banner.png" class="img-fluid d-none d-md-block w-100"
            alt="about banner">
        <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/mobile_banner/Events.jpg"
            class="img-fluid d-block d-md-none w-100" alt="Mobile banner">
        </div>
        <div class="subMenu_content mt-2">
            <app-sub-menu></app-sub-menu>
        </div>

        <div class="box mt-4">
            <div class="dropdown_tab">
                <div class="row">
                    <div class="col-md-4">
                        <select #ddlcategory name="" id="" class="form-control" [(ngModel)]="selectedcategory"
                            (change)="onchangecategory(ddlcategory.value)">
                            <option value="">All Category</option>
                            <option value="{{data?.categoryId}}" *ngFor="let data of AssignCategory">
                                {{data.categoryname}}</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select #ddlyear name="" id="" [(ngModel)]="Selectedyear" class="form-control"
                            (change)="onyearchange(ddlyear.value)">
                            <option value="">All Year</option>
                            <option value="{{year}}" *ngFor="let year of distinctYears">{{year}}</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <h1 class="text-center"><b>Moments That Matter</b></h1>
                <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
            </div>
            <p class="text-center">From cultural celebrations to educational workshops, Mount Litera Zee School hosts a
                variety of events designed to enrich student experiences. Stay connected and discover how our events
                shape an inspiring and dynamic school community.</p>

      <div *ngFor="let a of cat.news; let j = index"
     class="carousel-item"
     [class.active]="j === 0">
  
  <div class="row mb-3">
    <!-- Image Section -->
    <div class="col-md-5" [routerLink]="'/events/' + a?.slug">
      <div class="img_content">
        
        <!-- Check if logofiles exist -->
        <ng-container *ngIf="a?.logofiles?.length; else defaultImg">
          <div *ngFor="let img of a.logofiles">
            <img 
              [src]="img?.value || 'assets/img/MLZS/MLZS.svg'" 
              class="d-block w-100" 
              alt="Event Image"
            />
          </div>
        </ng-container>

        <!-- Fallback Image if no logofiles -->
        <ng-template #defaultImg>
          <img 
            src="assets/img/MLZS/MLZS.svg" 
            class="d-block w-100 defaultImg" 
            alt="Default Event Image"
          />
        </ng-template>

      </div>
    </div>

    <!-- Content Section -->
    <div class="col-md-7" [routerLink]="'/events/' + a?.slug">
      <h3>{{ a?.Title }}</h3>
      <!-- <div class="main_conent_box">
        <div class="long_para clamp-3" [innerHTML]="a.Long1"></div>
      </div> -->
      <button class="btn read_mode mt-2" [routerLink]="'/events/' + a.slug">
        Know More <i class="fa fa-long-arrow-right mx-2"></i>
      </button>
    </div>

  </div>
</div>

      
      
      <button
        class="carousel-control-prev"
        type="button"
        [attr.data-bs-target]="'#carousel-' + i"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        [attr.data-bs-target]="'#carousel-' + i"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>
</div>
        </div>
    </div>
</section>
