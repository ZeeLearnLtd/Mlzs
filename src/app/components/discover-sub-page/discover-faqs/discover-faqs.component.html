<section>
    <div class="programmes_main_page">
        <div class="banner_content">
            <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/faqs_top_banner.png" class="img-fluid d-none d-md-block w-100"
            alt="about banner">
        <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/banner/mobile_banner/FAQs.jpg"
            class="img-fluid d-block d-md-none w-100" alt="Mobile banner">
        </div>
        <div class="subMenu_content mt-2">
            <app-sub-menu></app-sub-menu>
        </div>
        <div class="box dropdown_tab mt-4">
            <div class="row">
                <div class="col-md-4">
                    <select #ddlcategory name="" id="" [(ngModel)]="Selectedcategory" class="form-control"
                        (change)="onchangecategory(ddlcategory.value)">
                        <option value="">All Category</option>
                        <option value="{{a.categoryId}}" *ngFor="let a of faqscategory">{{a.categoryname}}</option>
                    </select>
                </div>
                <div class="col-md-4"></div>
                <div class="col-md-4">
                    <div style="position: relative; width: 250px;">
                        <input type="text" placeholder="Search" class="form-control"
                            style="padding-left: 35px; width: 100%;" (input)="onSearchChange($event)">
                        <i class="fa fa-search"
                            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888;"></i>
                    </div>
                    <!-- <input name="" id="" placeholder="Search" class="form-control" (input)="onSearchChange($event)"> -->
                </div>
            </div>
        </div>
        <div class="mt-3">
            <div class="news_list my-5">
                <div class="faq_content">
                    <div class="title_content text-center">
                        <h1 class="text-white"><b>All You Need to Know</b></h1>
                        <img src="https://cdn.zeelearn.com/zeecms/mlzsWeb-assets/img/MLZS/text-bg.png" class="text_bg" alt="">
                        <p class="m-0 text-white mt-2">Do you have any questions about Mount Litera Zee School? Our FAQ
                            section provides clear answers to all your queries, from admissions to campus life.</p>
                    </div>
                    <div class="box mt-3">
                        <mat-accordion>
                            <mat-expansion-panel *ngFor="let faq of sortedFaqs">
                                <mat-expansion-panel-header>
                                    <h3 class="m-0">
                                        <div class="faq_title">{{faq.Title}}</div>
                                    </h3>
                                </mat-expansion-panel-header>
                                <span>
                                    <p [innerHTML]="faq.Long1"></p>
                                </span>
                            </mat-expansion-panel>
                        </mat-accordion>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
