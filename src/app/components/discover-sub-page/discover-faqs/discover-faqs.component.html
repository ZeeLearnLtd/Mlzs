<section>
    <div class="programmes_main_page">
        <div class="banner_content">
        <img src="../../../../assets/img/MLZS/banner/discover_banner.png" class="w-100" alt="">
    </div>
        <div class="subMenu_content">
            <app-sub-menu></app-sub-menu>
        </div>
        <div class="box dropdown_tab mt-4">
            <div class="row">
                <div class="col-md-4">
                    <select name="" id="" class="form-control">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div class="col-md-4"></div>
                <div class="col-md-4">
                    <input name="" id="" placeholder="Search" class="form-control">
                </div>
            </div>
        </div>
        <div class="mt-3">
            <div class="news_list mt-5">
    <div class="faq_content">
        <div class="title_content text-center">
            <h1 class="text-white"><b>FAQ</b></h1>
            <img src="../../../assets/img/MLZS/text-bg.png" class="text_bg" alt="">
            <p class="m-0 text-white">Have a burning question? We're here to answer the most common ones.</p>
        </div>
        <div class="box mt-3">
            <mat-accordion>
                <mat-expansion-panel *ngFor="let faq of faqsData">
                        <mat-expansion-panel-header>
                            <h6>{{faq.Title}}</h6>
                        </mat-expansion-panel-header>
                        <span>
                            <p [innerHTML]="faq.Long1"></p>
                        </span>
                </mat-expansion-panel>
            </mat-accordion>
        </div>
    </div>
            </div>
        </div>
    </div>
</section>
