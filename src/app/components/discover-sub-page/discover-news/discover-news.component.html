<section>
    <div class="programmes_main_page">
        <div class="banner_content">
            <img src="../../../../assets/img/MLZS/banner/discover_banner.png" class="w-100" alt="">
    </div>
        <div class="subMenu_content">
            <app-sub-menu></app-sub-menu>
        </div>
       
        <div class="box mt-3">
            <div class="dropdown_tab">
                <div class="row">
                    <div class="col-md-4">
                        <select name="" id="" class="form-control">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select name="" id="" class="form-control">
                            <option value="">Select Years</option>
                        </select>
                        
                    </div>
                    <div class="col-md-4">
                        <select name="" id="" class="form-control">
                            <option value="">Select Publisher</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <h2 class="text-center"><b>News</b></h2>
                <img src="../../../../assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
            </div>
            <p class="text-center">From academic milestones to vibrant extracurriculars, discover all the latest news and updates about Mount Litera Zee School from our community.</p>
       
            <div class="news_list mt-5">
                <div class="row" *ngFor="let a of newsData">
                    <div class="col-md-3">
                        <div *ngFor="let img of a?.logofiles">
                            <img src="{{img.value}}" width="100%" alt="">
                        </div>
                        
                    </div>
                    <div class="col-md-9">
                       <div class="news_text">
                        <h5><b>{{a?.Title}}</b></h5>
                        <p [innerHTML]="a.short"></p>
                        <p class="p-0 m-0"><small>Publisher - Zee News</small></p>
                        <p class="date_text p-0 m-0"><i>Date: {{a?.CreatedDate}}</i></p>
                        <button class="btn read_mode mt-4" routerLink="/news/{{a.slug}}">Know More <i class="fa fa-long-arrow-right mx-2"></i></button>
                       </div>
                    </div>
                </div>
            </div>
       
        </div>
       
        
    </div>
</section>
