<section>
    <div class="programmes_main_page">
        <div class="banner_content">
            <img src="../../../../assets/img/MLZS/banner/discover_banner.png" class="w-100" alt="">
        </div>
        <div class="subMenu_content">
            <app-sub-menu></app-sub-menu>
        </div>

        <div class="box mt-3">
            <div class="dropdown_tab">
                <div class="row">
                    <div class="col-md-4">
                        <select #ddlcategory name="" id="" [(ngModel)]="Selectedcategory" class="form-control"
                            (click)="onchangecategory(ddlcategory.value)">
                            <option value="">All Category</option>
                            <option value="{{a.categoryId}}" *ngFor="let a of Assinedcategory">{{a.categoryname}}
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4"></div>
                    <div class="col-md-4">
                        <input name="" id="" placeholder="Search" class="form-control" (input)="onSearchChange($event)">
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <h2 class="text-center"><b>Gallery</b></h2>
                <img src="../../../../assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
            </div>
            <p class="text-center">Browse through the Mount Litera Zee School gallery to experience the heart of our
                community, capturing the essence of learning, growth, and celebration.</p>

            <div class="news_list mt-5">
                <div class="row">
                    <div class="col-md-5">
                        <!-- <img src="{{getFirstData}}" width="100%" alt=""> -->                       
                        <div *ngIf="getFirstData && getFirstData.length">
                            <a [href]="getFirstData[0]?.value" data-fancybox="gallery1" class="fancybox">
                                <img [src]="getFirstData[0]?.value" class="pinchzoom_img" id="image" width="100%"
                                    alt="Image" />
                            </a>
                            <ng-container *ngFor="let a of getFirstData.slice(1)">
                                <a [href]="a.value" data-fancybox="gallery1" style="display: none;"
                                    class="fancybox"></a>
                            </ng-container>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="row mb-4 right_card" *ngFor="let a of photoGalleryData">
                            <div class="col-md-5" *ngFor="let img of a.logofiles">
                                <div *ngIf="!img?.value?.includes('youtu.')">
                                    <img src="{{img.value}}" width="100%" alt="">
                                </div>
                                <div *ngIf="img?.value?.includes('youtu.')">
                                   <iframe 
                                        [src]="getsanitizeurl(img.value)"
                                        frameborder="0" allowfullscreen>
                                    </iframe>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <div class="news_text">
                                    <h5><b>{{a.Title}}</b></h5>
                                    <!-- <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry. </p> -->
                                    <small><i>Date: {{a.CreatedDate}}</i></small>
                                    <!-- <button class="btn read_mode mt-4">Know More <i class="fa fa-long-arrow-right mx-2"></i></button> -->
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
