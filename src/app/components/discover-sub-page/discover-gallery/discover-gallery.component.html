<section>
    <div class="programmes_main_page">
        <div class="banner_content">
            <img src="../../../../assets/img/MLZS/banner/gallery_top_banner.png" class="w-100" alt="">
        </div>
        <div class="subMenu_content">
            <app-sub-menu></app-sub-menu>
        </div>

        <div class="box mt-3">
            <div class="dropdown_tab">
                <div class="row">
                    <div class="col-md-4">
                        <select #ddlcategory name="" id="" [(ngModel)]="Selectedcategory" class="form-control"
                            (click)="onchangecategory(ddlcategory.value)">
                            <option value="">All Category</option>
                            <option value="{{a.categoryId}}" *ngFor="let a of Assinedcategory">{{a.categoryname}}
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4"></div>
                    <div class="col-md-4">
                        <input name="" id="" placeholder="Search" class="form-control" (input)="onSearchChange($event)">
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <h1 class="text-center"><b>Life in Frames</b></h1>
                <img src="../../../../assets/img/MLZS/prg_text_bg.png" alt="" class="text_bg">
            </div>
            <p class="text-center">Browse through the Mount Litera Zee School gallery to experience the heart of our
                community, capturing the essence of learning, growth, and celebration.</p>

            <div class="news_list mt-5">
                <div class="row">
                    <div class="col-md-5">
                        <div *ngIf="getFirstData && getFirstData.length">
                            <a [href]="getFirstData[0]?.value" data-fancybox="gallery1" class="fancybox">
                                <img [src]="getFirstData[0]?.value" class="pinchzoom_img" id="image" width="100%"
                                    alt="Image" />
                            </a>
                            <ng-container *ngFor="let a of getFirstData.slice(1)">
                                <a [href]="a.value" data-fancybox="gallery1" style="display: none;"
                                    class="fancybox"></a>
                            </ng-container>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="cascade-slider_container">
                            <div class="cascade-slider_slides" [style.transform]="translateY">
                                <div class="cascade-slide item_text"
                                    *ngFor="let img of photoGalleryData; let i = index">
                                    <div class="row">
                                        <div class="col-md-5">
                                            <div class="img_box">
                                                <div *ngFor="let img of img.logofiles">
                                                    <img src="{{img?.value}}" width="100%" alt="">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-7">
                                            <div class="news_text">
                                                <h6><strong>{{ img.Title }}</strong></h6>
                                                <p class="m-0 p-0 long_para">{{ img.short }}</p>
                                                <p class="m-0 p-0 date_content"><i>Date: {{img.StartDate}}</i></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="cascade-dots">
                                <div class="dot" *ngFor="let dot of [].constructor(totalPages); let i = index"
                                    [class.active]="currentIndex === i" (click)="moveToSlide(i)">
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </div>

        <div class="box mt-5">
            <div class="video_gallery_content">
                 <div class="owl-carousel owl-theme news_owl" id="">
                      <div class="item" *ngFor="let a of videoGalleryList">
                        <div class="item_img_content" *ngIf="a.safeUrl">
                            <iframe class="" [src]="a.safeUrl" title="Chiv Chiv Chimni in 3D - Marathi 3D Rhymes | Marathi Balgeet Song मराठी गाणी 2019" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                        </div>
                      </div>
                    </div>
            </div>
        </div>
    </div>
</section>
<ngx-spinner type="ball-scale-multiple"></ngx-spinner>
