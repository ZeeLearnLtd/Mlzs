
<section>
    <div class="faq_content">
        <div class="mt-3">
            <mat-accordion>
                <mat-expansion-panel *ngFor="let faq of sortedFaqs"
                [ngClass]="{ 'shadow-panel': shadowFaq }">
                        <mat-expansion-panel-header>
                            <h3 class="faq_title m-0">{{faq.Title}}</h3>
                        </mat-expansion-panel-header>
                        <hr>
                        <span>
                            <p class="short_text" [innerHTML]="faq.Short"></p>
                        </span>
                </mat-expansion-panel>
            </mat-accordion>
        </div>
    </div>
</section>
